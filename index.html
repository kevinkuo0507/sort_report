<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>演算法動畫展示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #00d2ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .subtitle {
      color: #888;
      margin-bottom: 48px;
      font-size: 1rem;
      text-align: center;
    }

    .card-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      max-width: 900px;
      width: 100%;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 36px 32px;
      width: 280px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-6px);
      background: rgba(255, 255, 255, 0.11);
      box-shadow: 0 12px 40px rgba(0, 210, 255, 0.25);
    }

    .card-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00d2ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card-desc {
      font-size: 0.9rem;
      color: #aaa;
      line-height: 1.6;
    }

    footer {
      margin-top: 60px;
      color: #555;
      font-size: 0.82rem;
    }
  </style>
</head>
<body>

  <h1>演算法動畫展示</h1>
  <p class="subtitle">選擇一個演算法，開始互動式學習</p>

  <div class="card-grid">

    <a class="card" href="bubble_sort_animation.html">
      <div class="card-icon">🫧</div>
      <div class="card-title">氣泡排序法</div>
      <div class="card-desc">透過動畫逐步觀察氣泡排序的比較與交換過程，支援速度調整與自訂陣列。</div>
    </a>

    <a class="card" href="selection_sort_animation.html">
      <div class="card-icon">🎯</div>
      <div class="card-title">選擇排序法</div>
      <div class="card-desc">以每輪找最小值的方式完成排序，清楚展示比較、最小值更新與交換流程。</div>
    </a>

    <a class="card" href="insertion_sort_animation.html">
      <div class="card-icon">🧩</div>
      <div class="card-title">插入排序法</div>
      <div class="card-desc">模擬將 key 插入已排序區間的過程，展示比較、位移與插入步驟。</div>
    </a>

    <!-- 未來可在此新增更多演算法卡片 -->

  </div>

  <footer>© 2026 演算法動畫展示</footer>

</body>
</html>
